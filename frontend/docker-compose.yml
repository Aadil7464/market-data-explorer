version: '3.8'
services:
  python-service:
    build: ./python-service
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PYTHON_URL=http://python-service:8000
    depends_on:
      - python-service

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend